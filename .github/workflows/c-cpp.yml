name: Build NumWorks Doom

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ARM Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi

      - name: Install nwlink
        run: |
          npm install -g nwlink

      - name: Preparation - Move all files to src
        run: |
          # On déplace tout le code de 'originalSource' vers 'src'
          # car le Makefile semble programmé pour ne regarder que là.
          cp originalSource/* src/ 2>/dev/null || true
          echo "Contenu de src après déplacement :"
          ls src

      - name: Compile Application
        run: |
          make clean
          # On laisse le Makefile faire son travail normalement 
          # maintenant que tous les fichiers sont dans le bon dossier
          make build

      - name: Save NWA file
        uses: actions/upload-artifact@v4
        with:
          name: nw-doom-app
          path: "**/*.nwa"
