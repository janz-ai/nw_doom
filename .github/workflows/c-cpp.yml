name: Build NumWorks Doom

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install ARM Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi libnewlib-arm-none-eabi

      - name: Install nwlink
        run: |
          npm install -g nwlink

      - name: Compile Application
        run: |
          # On nettoie d'abord pour repartir à zéro
          make clean
          
          # On récupère tous les fichiers .cpp et .c
          # On les passe directement en argument de la commande 'make'
          # pour écraser la variable SRCS du Makefile
          SOURCES=$(find src -name "*.cpp" -o -name "*.c" | tr '\n' ' ')
          echo "Fichiers trouvés : $SOURCES"
          
          make build SRCS="$SOURCES"

      - name: Save NWA file
        uses: actions/upload-artifact@v4
        with:
          name: nw-doom-app
          path: "**/*.nwa"
